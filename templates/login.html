<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerberus — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: min(420px, 100%);
      padding: 36px 32px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.8rem;
      margin: 0 0 4px;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    .login-logo p {
      margin: 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .tab-row {
      display: flex;
      border-bottom: 2px solid var(--line);
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 10px 0;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 150ms, border-color 150ms;
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }

    .form-group input {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.96rem;
      color: var(--ink);
      background: #fff;
      transition: border-color 150ms;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 150ms;
    }

    .login-btn:hover {
      background: var(--primary-strong);
    }

    .login-error {
      background: #fff5f4;
      border: 1px solid #f2c2bc;
      border-radius: 10px;
      padding: 10px 14px;
      color: #8f261d;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .card-deck-mini {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .card-mini {
      width: 52px;
      height: 32px;
      border-radius: 6px;
    }

    .card-mini-1 { background: linear-gradient(135deg,#0f7b8c,#2bb7c6); }
    .card-mini-2 { background: linear-gradient(135deg,#8e44ad,#5b86e5); }
    .card-mini-3 { background: linear-gradient(135deg,#ea5f5f,#ff9a76); }
  </style>
</head>
<body>
  <div class="background-glow"></div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="card-deck-mini" aria-hidden="true">
          <div class="card-mini card-mini-1"></div>
          <div class="card-mini card-mini-2"></div>
          <div class="card-mini card-mini-3"></div>
        </div>
        <h1>Cerberus</h1>
        <p>Fraud Detection Console</p>
      </div>

      <div class="tab-row">
        <button class="tab-btn {% if tab == 'login' %}active{% endif %}" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn {% if tab == 'register' %}active{% endif %}" onclick="switchTab('register')">Sign Up</button>
      </div>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <div id="tab-login" class="tab-panel {% if tab == 'login' %}active{% endif %}">
        <form method="post">
          <input type="hidden" name="action" value="login" />
          <div class="form-group">
            <label for="login-username">Username</label>
            <input id="login-username" name="username" type="text" autocomplete="username" placeholder="your username" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="login-btn">Sign In</button>
        </form>
      </div>

      <div id="tab-register" class="tab-panel {% if tab == 'register' %}active{% endif %}">
        <form method="post">
          <input type="hidden" name="action" value="register" />
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input id="reg-username" name="username" type="text" autocomplete="username" placeholder="choose a username" required />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input id="reg-password" name="password" type="password" autocomplete="new-password" placeholder="at least 6 characters" required />
          </div>
          <div class="form-group">
            <label for="reg-confirm">Confirm Password</label>
            <input id="reg-confirm" name="confirm_password" type="password" autocomplete="new-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="login-btn">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelectorAll('.tab-btn')[tab === 'login' ? 0 : 1].classList.add('active');
    }
  </script>
</body>
</html>
